plugins {
    id 'java'
    id 'application'
}

application {
    mainClass = 'main.core.TicTacToeApp'
}

group 'org.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.1'
}

test {
    useJUnitPlatform()
    useJUnit()
    testLogging.showStandardStreams = true
}